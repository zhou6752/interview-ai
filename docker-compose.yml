version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: interview_ai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgvector:
    image: pgvector/pgvector:0.8.2-pg16
    environment:
      POSTGRES_USER: vector_user
      POSTGRES_PASSWORD: ${PG_PASSWORD:-vector_pass}
      POSTGRES_DB: interview_ai_vector
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vector_user -d interview_ai_vector"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - PG_HOST=pgvector
      - JWT_SECRET=${JWT_SECRET:-MyJWTSecretKeyThatIsAtLeast32CharactersLong!!}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-InterviewAISecret2024}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - PG_PASSWORD=${PG_PASSWORD:-vector_pass}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  pgvector_data: